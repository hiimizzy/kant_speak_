<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kant Speak | Aprenda inglês brincando</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased">
  <div class="min-h-screen flex flex-col items-center justify-center p-6 gap-8">
    <div class="flex flex-col items-center gap-3 text-center">
      <div class="animate-float drop-shadow-4xl bg-white/40 rounded-full p-3 backdrop-blur-sm">
        <img src="img/icone.png" alt="mascote" class="w-50 h-48 object-contain">
      </div>
      <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-gray-800">Kant <span
          class="text-blue-600">Speak</span></h1>
      <p class="text-xl text-gray-500 max-w-md">Aprenda inglês de um jeito divertido!</p>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-5 w-full max-w-md">
      <a href="alphabet.html" class="btn-module btn-alphabet px-5 py-2.5 text-base rounded-xl"><i
          class="fas fa-pen-fancy"></i><span>Alphabet</span></a>
      <a href="listen.html" class="btn-module btn-listen px-5 py-2.5 text-base rounded-xl"><i
          class="fas fa-ear-listen"></i><span>Listen</span></a>
      <a href="speak.html" class="btn-module btn-speak px-5 py-2.5 text-base rounded-xl"><i
          class="fas fa-microphone-alt"></i><span>Speak</span></a>
      <a href="write.html" class="btn-module btn-write px-5 py-2.5 text-base rounded-xl"><i
          class="fas fa-book-open"></i><span>Write</span></a>
      <a href="draw.html" class="btn-module btn-draw px-5 py-2.5 text-base rounded-xl"><i
          class="fa-solid fa-brush"></i><span>Draw</span></a>
      <a href="karaoke.html" class="btn-module btn-karaoke bg-teal-500  px-5 py-2.5 text-base rounded-xl"><i
          class="fa-solid fa-music"></i><span>Karaoke</span></a>
      <a href="ispy.html" class="btn-module bg-lime-500 btn-ispy px-5 py-2.5 text-base rounded-xl bg-purple"><i class="fas fa-eye"></i><span>I
          Spy</span></a>
      <a href="number.html" class="btn-module btn-number bg-pink-500 text-white px-5 py-2.5 text-base rounded-xl"><i
          class="fas fa-hashtag"></i><span>Numbers</span></a>
    </div>
    <p class="text-xs text-gray-600 mt-6 text-center">˗ˏˋ Escolha uma atividade e comece a praticar! ˎˊ˗ </p>
  </div>
</body>

</html>
