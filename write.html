<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kant Speak - Write</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="shortcut icon" href="img/autismo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }
    .feedback-toast { animation: fadeOut 2s forwards; }
    input:focus { outline: none; ring: 2px solid #4A90E2; }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 min-h-screen p-4 md:p-6">
  <div class="max-w-lg mx-auto flex flex-col gap-6">
    <div class="flex items-center justify-between bg-white/80 backdrop-blur-sm p-3 rounded-2xl shadow-sm">
      <a href="home.html" class="bg-gray-100 hover:bg-gray-200 transition-colors p-2 rounded-full w-10 h-10 flex items-center justify-center text-2xl">←</a>
      <div class="flex items-center gap-3 bg-amber-50 px-4 py-2 rounded-full">
        <span class="text-yellow-500 text-xl">⭐</span>
        <span id="scoreValue" class="font-bold text-gray-800 text-xl">0</span>
      </div>
    </div>
    <h2 class="text-3xl font-bold text-center text-gray-700">📝 Escreva em inglês!</h2>
    <div class="bg-white rounded-2xl shadow-xl border border-gray-200 p-6 flex flex-col items-center gap-6">
      <div class="text-8xl" id="wordEmoji">🐕</div>
      <p class="text-2xl text-gray-500" id="translationText">(cachorro)</p>
      <input type="text" id="wordInput" placeholder="Digite a palavra..." class="w-full text-2xl text-center p-4 rounded-xl border-2 border-gray-200 bg-gray-50 font-bold focus:border-blue-500 transition-all shadow-sm">
      <div class="flex gap-4 flex-wrap justify-center">
        <button id="checkBtn" class="bg-blue-600 text-white px-8 py-4 rounded-xl text-xl font-bold hover:bg-blue-700 transition-all shadow-md disabled:opacity-50">✅ Verificar</button>
        <button id="hintBtn" class="bg-amber-500 text-white px-8 py-4 rounded-xl text-xl font-bold hover:bg-amber-600 transition-all shadow-md">🔊 Ouvir</button>
      </div>
    </div>
    <div id="feedbackContainer" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none"></div>
    <div class="bg-white/70 rounded-2xl p-3 flex justify-center gap-2 shadow-sm" id="starsContainer">
      <span class="text-3xl star">⭐</span><span class="text-3xl star">⭐</span><span class="text-3xl star">⭐</span><span class="text-3xl star">⭐</span><span class="text-3xl star">⭐</span>
    </div>
    <button id="nextBtn" class="bg-amber-500 text-white font-bold py-3 rounded-xl text-xl shadow-md hover:shadow-xl transition-all mx-auto w-full max-w-xs">Próxima palavra →</button>
  </div>
  <script src="./eventos/write.js"></script>
</body>
</html>
