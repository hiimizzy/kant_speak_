<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Memory Game - Kant Speak</title>
  <link rel="shortcut icon" href="img/autismo.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Nunito', sans-serif; user-select: none; }
    .card {
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 2.5rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .card.flipped, .card.matched {
      background: white;
      color: #1e293b;
      cursor: default;
      box-shadow: inset 0 0 0 2px #cbd5e1;
      transform: scale(0.98);
    }
    .card.matched {
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }
    .card:hover:not(.flipped):not(.matched) {
      transform: scale(1.02);
      box-shadow: 0 8px 15px -3px rgba(0,0,0,0.2);
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }
    .feedback-toast { animation: fadeOut 2s forwards; }
    .feedback-toast.win { background: #22c55e; color: white; }
    .feedback-toast.error { background: #ef4444; color: white; }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 min-h-screen p-4 flex items-center justify-center">
  <div class="max-w-2xl w-full bg-white/80 backdrop-blur rounded-3xl shadow-xl p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <a href="home.html" class="bg-gray-200 hover:bg-gray-300 rounded-full p-2 w-10 h-10 flex items-center justify-center">←</a>
      <div class="text-center">
        <h1 class="text-2xl font-black text-indigo-600">🧠 Memory Game</h1>
        <p class="text-sm text-gray-500">Encontre os pares!</p>
      </div>
      <div class="bg-amber-100 px-4 py-2 rounded-full font-bold flex items-center gap-2">
        <span>⭐</span> <span id="memoryScore">0</span>
      </div>
    </div>

    <!-- Placar de pares encontrados -->
    <div class="text-center mb-4">
      <span class="text-gray-600">Pares encontrados:</span>
      <span id="pairsMatched" class="font-bold text-xl ml-2">0</span>
      <span class="text-gray-600">/ <span id="totalPairs">8</span></span>
    </div>

    <!-- Grade do jogo -->
    <div id="gameBoard" class="grid grid-cols-4 gap-3 mb-6">
      <!-- Gerado por JS -->
    </div>

    <!-- Botões -->
    <div class="flex justify-center gap-4">
      <button id="resetBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-full transition shadow-md">
        🔄 Jogar novamente
      </button>
    </div>

    <!-- Feedback -->
    <div id="feedbackContainer" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 pointer-events-none z-50"></div>
  </div>

  <script src="eventos/memory.js"></script>
</body>
</html>
