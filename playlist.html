<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Playlist</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="style.css">
        <link rel="shortcut icon" href="img/autismo.png" type="image/x-icon">
</head>

<body class="antialiased">

        <div class="min-h-screen flex flex-col items-center justify-center p-6 gap-8">
                <!-- botão de voltar -->
                <div class="flex justify-between items-center bg-white rounded-3xl shadow-lg w-full max-w-2xl p-4">
                        <a href="home.html"
                                class="bg-gray-100 hover:bg-gray-200 transition-colors p-2 rounded-full w-10 h-10 flex items-center justify-center text-2xl">←</a>
                        <h1 class="text-3xl font-extrabold tracking-tight">Choose <span class="text-blue-600">a
                                        song!</span></h1>
                </div>
                <img src="img/cat_sing.png" alt="cat singing" class="w-52 h-48 object-contain">
                <div class=" grid grid-cols-1 md:grid-cols-2 gap-5 w-full max-w-md">

                        <a href="songs/song1.html" class="btn-module btn-alphabet px-5 py-2.5 text-base rounded-xl"><i
                                        class="fas fa-pen-fancy"></i><span>Song 1 - Hello Song</span></a>
                        <a href="songs/song2.html" class="btn-module btn-listen px-5 py-2.5 text-base rounded-xl"><i
                                        class="fas fa-ear-listen"></i><span>Song 2 - ABC</span></a>
                        <a href="songs/song3.html"
                                class="btn-module btn-speak px-5 text-white py-2.5 text-base rounded-xl"><i
                                        class="fas fa-microphone-alt"></i><span>Song 3 - Head Shouldres Knees And
                                        Toes</span></a>
                        <a href="songs/song4.html" class="btn-module btn-write px-5 py-2.5 text-base rounded-xl"><i
                                        class="fas fa-book-open"></i><span>Song 4 - Goodbye Song</span></a>

                        <a href="songs/song5.html"
                                class="btn-module btn-speak px-5 text-white py-2.5 text-base rounded-xl"><i
                                        class="fas fa-microphone-alt"></i><span>Song 5 - Everybody Hurts</span></a>
                </div>
</body>

</html>
