<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Desenho - Kant Speak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Nunito', sans-serif;
    }
    body {
      background-color: #eef2ff;
    }
    canvas {
      border: 4px solid #3b82f6;
      border-radius: 24px;
      background-color: #ffffff;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: auto;
    }
    .btn-large {
      padding: 12px 24px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 60px;
      transition: 0.1s linear;
    }
    .btn-large:active {
      transform: scale(0.97);
    }
    /* Feedback simples, sem animações complexas */
    .feedback-toast {
      background-color: #22c55e;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
    }
    /* Estrelas com contraste */
    .star {
      font-size: 2rem;
      opacity: 0.3;
      transition: none;
    }
    .star.lit {
      opacity: 1;
      filter: drop-shadow(0 0 2px gold);
    }
  </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center">

  <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-6">
    <!-- Cabeçalho com pontuação e voltar -->
    <div class="flex justify-between items-center mb-6">
      <a href="home.html" class="bg-gray-200 hover:bg-gray-300 rounded-full p-3 text-2xl">←</a>
      <div class="flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full">
        <span class="text-2xl">⭐</span>
        <span id="scoreValue" class="text-2xl font-bold">0</span>
      </div>
    </div>

    <!-- Palavra e emoji -->
    <div class="text-center mb-6">
      <div id="wordEmoji" class="text-7xl">🐱</div>
      <div id="wordText" class="text-5xl font-black text-blue-600 mt-2">CAT</div>
      <div id="wordTranslation" class="text-xl text-gray-500">(gato)</div>
    </div>

    <!-- Canvas para desenho -->
    <div class="flex justify-center mb-6">
      <canvas id="drawCanvas" width="500" height="350" style="max-width:100%; height:auto;"></canvas>
    </div>

    <!-- Botões grandes e simples -->
    <div class="flex flex-wrap justify-center gap-4 mb-6">
      <button id="clearBtn" class="btn-large bg-gray-500 text-white hover:bg-gray-600">🗑️ Limpar</button>
      <button id="completeBtn" class="btn-large bg-green-600 text-white hover:bg-green-700">✅ Completei</button>
      <button id="nextBtn" class="btn-large bg-amber-500 text-white hover:bg-amber-600">⏩ Próxima</button>
    </div>

    <!-- Estrelas de recompensa -->
    <div class="flex justify-center gap-2" id="starsContainer">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>

  <!-- Container de feedback (aparece no topo) -->
  <div id="feedbackContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none"></div>

  <script src="./eventos/draw.js"></script>
</body>
</html>
