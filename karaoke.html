<div class="card">
  <h2><?= $data['nome'] ?></h2>
  <h3><?= $data['item']['titulo'] ?></h3>
  <div class="lyrics" id="lyrics"><?= nl2br($data['item']['letra']) ?></div>
  <button id="singBtn" class="btn-primary">🎤 Cantar</button>
  <form method="POST">
    <input type="hidden" name="action" value="karaoke">
    <button type="submit" name="complete" value="1" class="btn-primary green">✅ Completei</button>
  </form>
</div>

<script>
document.getElementById('singBtn').onclick = () => {
    const lines = <?= json_encode(explode("\n", $data['item']['letra'])) ?>;
    let i = 0;
    function speakLine() {
        if (i >= lines.length) return;
        const utterance = new SpeechSynthesisUtterance(lines[i]);
        utterance.lang = 'en-US';
        utterance.onend = () => { i++; speakLine(); };
        window.speechSynthesis.speak(utterance);
    }
    speakLine();
};
</script>
