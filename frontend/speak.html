<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak - Kant Speak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> .mic-visual { width: 100px; height: 100px; background: orange; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: auto; transition: 0.1s; } .mic-visual.listening { animation: pulse 1s infinite; } @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245,166,35,0.4); } 70% { box-shadow: 0 0 0 20px rgba(245,166,35,0); } 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); } } </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 p-4">
  <div class="max-w-lg mx-auto bg-white rounded-2xl shadow p-6">
    <div class="flex justify-between mb-4"><a href="home.html" class="bg-gray-200 rounded-full p-2">←</a><div class="bg-amber-100 px-4 py-2 rounded-full">⭐ <span id="scoreValue">0</span></div></div>
    <h1 class="text-3xl font-bold text-center text-yellow-600">🎤 Speak</h1>
    <div class="text-center text-8xl my-4" id="wordEmoji">🐱</div>
    <div id="recognizedContainer" class="hidden bg-gray-100 rounded-xl p-3 text-center"><p>Você disse: <strong id="recognizedText"></strong></p></div>
    <div class="mic-visual" id="micVisual">🎤</div>
    <div class="flex justify-center gap-4"><button id="speakBtn" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold">Falar</button><button id="hintBtn" class="bg-amber-500 text-white px-6 py-3 rounded-full font-bold">Dica</button></div>
    <button id="nextBtn" class="w-full bg-amber-500 text-white py-3 rounded-full font-bold mt-6">Próxima →</button>
    <div id="feedbackContainer" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 pointer-events-none"></div>
  </div>
  <script src="../eventos/speak.js"></script>
</body>
</html>
