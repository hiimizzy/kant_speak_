<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Math Builder - Kant Speak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="img/autismo.png" type="image/x-icon">
  <style>
    * { font-family: 'Nunito', sans-serif; user-select: none; touch-action: manipulation; }
    .drag-item { cursor: grab; transition: transform 0.1s; }
    .drag-item:active { cursor: grabbing; }
    .drop-zone {
      background-color: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 1rem;
      transition: all 0.2s;
      min-width: 90px;
    }
    .drop-zone.drag-over { background-color: #fef9c3; border-color: #eab308; }
    .number-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }
    .number-card {
      background: white;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      min-width: 60px;
    }
    .feedback-toast { animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
    .star { font-size: 1.8rem; opacity: 0.3; transition: none; }
    .star.lit { opacity: 1; filter: drop-shadow(0 0 4px gold); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.5;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 min-h-screen p-4">
  <div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4 bg-white/80 backdrop-blur p-3 rounded-2xl">
      <a href="home.html" class="bg-gray-200 hover:bg-gray-300 rounded-full p-2 w-10 h-10 flex items-center justify-center">←</a>
      <div class="flex items-center gap-3 bg-amber-50 px-4 py-2 rounded-full">
        <span class="text-yellow-500 text-xl">⭐</span>
        <span id="scoreValue" class="font-bold text-gray-800 text-xl">0</span>
      </div>
    </div>

    <h1 class="text-3xl font-black text-center text-indigo-600 mb-1">🧮 Math Builder</h1>
    <p class="text-center text-gray-500 mb-4">Arraste números e operadores. Digite a resposta. O sistema falará a conta em inglês!</p>

    <!-- Estrelas de progresso -->
    <div class="flex justify-center gap-1 mb-4" id="starsContainer">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>

    <!-- Área de montagem -->
    <div class="bg-white/60 rounded-2xl p-5 mb-6">
      <div class="flex flex-wrap justify-center items-center gap-3 mb-6">
        <div id="dropNum1" class="drop-zone w-28 h-28 flex items-center justify-center text-3xl font-bold" data-zone="num1">?</div>
        <div id="dropOperator" class="drop-zone w-20 h-28 flex items-center justify-center text-3xl font-bold" data-zone="operator">?</div>
        <div id="dropNum2" class="drop-zone w-28 h-28 flex items-center justify-center text-3xl font-bold" data-zone="num2">?</div>
        <span class="text-3xl font-bold">=</span>
        <div id="dropAnswer" class="drop-zone w-36 h-28 flex items-center justify-center p-1" data-zone="answer">
          <input type="number" id="answerInput" placeholder="?" 
                 class="w-full h-full text-center text-3xl font-bold bg-transparent outline-none border-none rounded-xl">
        </div>
      </div>
      <div class="flex justify-center gap-4">
        <button id="checkBtn" class="bg-green-600 text-white px-6 py-3 rounded-full font-bold text-xl shadow-md hover:bg-green-700 transition">✅ Verificar</button>
        <button id="speakEqBtn" class="btn-speak text-blue-500 bg-blue-100 px-6 py-3 rounded-full font-bold text-xl shadow-md hover:shadow-lg transition flex items-center gap-2">🔊 Ouvir equação</button>
        <button id="clearBtn" class="bg-gray-500 text-white px-6 py-3 rounded-full font-bold text-xl shadow-md hover:bg-gray-600 transition">🗑️ Limpar</button>
      </div>
    </div>

    <!-- Paleta -->
    <div class="bg-white/70 rounded-2xl p-4 shadow-lg">
      <h2 class="text-xl font-bold text-center mb-3">🔢 Arraste os blocos para dentro da conta</h2>
      <div id="palette" class="number-palette"></div>
      <p class="text-center text-sm text-gray-500 mt-3">💡 Dica: você pode arrastar qualquer número ou operador. Depois digite a resposta.</p>
    </div>

    <div id="feedbackContainer" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 pointer-events-none z-50"></div>
  </div>
  <script src="eventos/math.js"></script>
</body>
</html>
