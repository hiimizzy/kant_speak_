<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✏️ Alfabeto Mágico - Desenhe com o Dedo</title>
  <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    canvas {
      border: 4px solid #f97316;
      border-radius: 24px;
      background-color: #ffffff;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: auto;
    }
    .btn-large {
      padding: 12px 24px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 60px;
      transition: 0.1s linear;
    }
    .btn-large:active {
      transform: scale(0.97);
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }
    .feedback-toast { animation: fadeOut 2s forwards; }
  </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-sky-50 to-indigo-50">

  <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-6">
    <!-- Cabeçalho com pontuação e voltar -->
    <div class="flex justify-between items-center mb-6">
      <a href="home.html" class="bg-gray-200 hover:bg-gray-300 rounded-full p-3 text-2xl">←</a>
      <div class="flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full">
        <span class="text-2xl">⭐</span>
        <span id="scoreValue" class="text-2xl font-bold">0</span>
      </div>
    </div>

    <!-- Letra atual -->
    <div class="text-center mb-6">
      <div class="text-2xl md:text-3xl font-bold text-gray-700 mb-2">✏️ Desenhe a letra:</div>
      <div id="currentLetterDisplay" class="text-7xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600">A</div>
      <button id="speakLetterBtn" class="bg-indigo-100 hover:bg-indigo-200 transition-colors p-3 rounded-full text-2xl mt-2">🔊</button>
    </div>

    <!-- Canvas para desenho -->
    <div class="flex justify-center mb-6">
      <canvas id="drawCanvas" width="500" height="350" style="max-width:100%; height:auto;"></canvas>
    </div>

    <!-- Botões -->
    <div class="flex flex-wrap justify-center gap-4 mb-6">
      <button id="clearBtn" class="btn-large bg-gray-500 text-white hover:bg-gray-600">🗑️ Limpar</button>
      <button id="checkBtn" class="btn-large bg-green-600 text-white hover:bg-green-700">✅ Verificar</button>
      <button id="nextBtn" class="btn-large bg-amber-500 text-white hover:bg-amber-600">⏩ Próxima</button>
    </div>
  </div>

  <!-- Feedback -->
  <div id="feedbackContainer" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none"></div>

  <script src="./eventos/alphabet.js"></script>
</body>
</html>
